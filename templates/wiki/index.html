{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Battle Cats Wiki | By: Huki</title>
    <meta name="description" content="Безкоштовна енциклопедія гри Battle Cats: коти, здібності, трейти, форми еволюції та повні статистики юнітів.">
    <meta property="og:title" content="The Battle Cats Wiki">
    <meta property="og:description" content="Безкоштовна енциклопедія гри Battle Cats: коти, здібності, трейти, форми еволюції та повні статистики юнітів.">
    <meta property="og:type" content="website">
    <!-- Favicon (іконка вкладки браузера): квадратний набір іконок різних розмірів,
         щоб браузер брав чіткий варіант замість стиснутого прямокутного лого -->
    <link rel="icon" type="image/png" sizes="16x16" href="{% static 'images/favicon/favicon-16x16.png' %}">
    <link rel="icon" type="image/png" sizes="32x32" href="{% static 'images/favicon/favicon-32x32.png' %}">
    <link rel="icon" type="image/png" sizes="48x48" href="{% static 'images/favicon/favicon-48x48.png' %}">
    <link rel="apple-touch-icon" sizes="180x180" href="{% static 'images/favicon/apple-touch-icon.png' %}">
    <link rel="icon" type="image/png" sizes="192x192" href="{% static 'images/favicon/android-chrome-192x192.png' %}">
    <link rel="icon" type="image/png" sizes="512x512" href="{% static 'images/favicon/android-chrome-512x512.png' %}">
    <link rel="stylesheet" href="{% static 'css/style.css' %}?v={% now "U" %}">
</head>
<body>

    <!-- ДУХИ, що літають по бокових порожніх полях сторінки (8 штук: по 4 зліва і справа) -->
    <img src="{% static 'images/spirit_icon.png' %}" alt="" class="spirit-icon spirit-icon--left spirit-icon--1">
    <img src="{% static 'images/spirit_icon.png' %}" alt="" class="spirit-icon spirit-icon--right spirit-icon--2">
    <img src="{% static 'images/spirit_icon.png' %}" alt="" class="spirit-icon spirit-icon--left spirit-icon--3">
    <img src="{% static 'images/spirit_icon.png' %}" alt="" class="spirit-icon spirit-icon--right spirit-icon--4">
    <img src="{% static 'images/spirit_icon.png' %}" alt="" class="spirit-icon spirit-icon--left spirit-icon--5">
    <img src="{% static 'images/spirit_icon.png' %}" alt="" class="spirit-icon spirit-icon--right spirit-icon--6">
    <img src="{% static 'images/spirit_icon.png' %}" alt="" class="spirit-icon spirit-icon--left spirit-icon--7">
    <img src="{% static 'images/spirit_icon.png' %}" alt="" class="spirit-icon spirit-icon--right spirit-icon--8">

    <!-- Шапка сайту: закріплена зверху, лого Wiki зліва (дзеркально), текст одразу після,
         кнопка мови та гіфка - праворуч -->
    <div class="wiki-header" data-spirit-obstacle>
        <div class="header-left">
            <img src="{% static 'images/wiki_logo2.png' %}" alt="Wiki logo" class="wiki-logo">
            <div class="header-text">
                <h1 data-i18n="site_title">The Battle Cats Wiki</h1>
                <p data-i18n="site_subtitle">Welcome to the cat encyclopedia. | By: Huki</p>
            </div>
        </div>

        <div class="header-right">
            <div class="lang-switch">
                <button class="lang-btn" type="button" id="langBtn" onclick="document.getElementById('langDropdown').classList.toggle('open')">EN ▾</button>
                <div class="lang-dropdown" id="langDropdown">
                    <a href="#" onclick="setLanguage('en'); return false;">English</a>
                    <a href="#" onclick="setLanguage('de'); return false;">Deutsch</a>
                    <a href="#" onclick="setLanguage('es'); return false;">Español</a>
                    <a href="#" onclick="setLanguage('ja'); return false;">日本語</a>
                </div>
            </div>

            <img src="{% static 'images/falling.gif' %}" alt="cat gif" class="header-gif">
        </div>
    </div>

    <div class="header-spacer"></div>

    <div class="cat-container" data-spirit-obstacle>

        <a href="{% url 'units_menu' %}" class="battle-cats-btn btn-shifted-left">
            <img src="{% static 'images/cat_icon.png' %}" alt="cat icon" class="btn-cat-icon">
            <span class="battle-cats-font" id="catDictBtnText" data-i18n="cat_dictionary">Units</span>
        </a>

        <!-- Коти тепер не виводяться тут списком - переходь у "Units",
             там кожен кіт лежить у своїй колонці за рідкістю -->
        <p class="home-hint" data-i18n="home_hint">
            All units are sorted by rarity in the Units catalog - click the button above to browse them.
        </p>
    </div>

    <script src="{% static 'js/translations.js' %}"></script>
    <!-- Робить духів по боках перетягуваними мишкою/пальцем, з плавним
         інерційним рухом, як маленькі об'єкти в невагомості -->
    <script src="{% static 'js/spirit-drag.js' %}"></script>

</body>
</html>
